<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial;
      margin:0;
      background: linear-gradient(135deg,#6a00ff,#b300ff);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
    }

    .box{
      background:white;
      color:black;
      padding:25px;
      border-radius:15px;
      width:320px;
      text-align:center;
    }

    input{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:1px solid #ccc;
      border-radius:8px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:10px;
      margin-top:12px;
      background:#2563eb;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    #msg{
      margin-top:10px;
      font-size:14px;
    }

    a{
      cursor:pointer;
      color:#2563eb;
      font-size:13px;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>🏋️ Fitness Login</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p id="msg"></p>

  <p>
    <a onclick="createAccount()">Create Account</a>
  </p>

</div>

<script>

/* ================= USERS DATABASE ================= */
function getUsers(){
  return JSON.parse(localStorage.getItem("users")) || {};
}

function saveUsers(users){
  localStorage.setItem("users", JSON.stringify(users));
}

/* ================= LOGIN ================= */
function login(){

  let u = document.getElementById("user").value.trim();
  let p = document.getElementById("pass").value.trim();
  let msg = document.getElementById("msg");

  if(!u || !p){
    msg.style.color="red";
    msg.innerText="Enter username & password";
    return;
  }

  let users = getUsers();

  /* USER NOT FOUND */
  if(!users[u]){
    msg.style.color="red";
    msg.innerText="User not found";
    return;
  }

  /* WRONG PASSWORD */
  if(users[u] !== p){
    msg.style.color="red";
    msg.innerText="Invalid password";
    return;
  }

  /* SUCCESS LOGIN */
  localStorage.setItem("username", u);

  /* INIT USER DATA KEYS */
  let kcalKey = "fitness_" + u + "_kcal";
  let historyKey = "fitness_" + u + "_history";

  if(localStorage.getItem(kcalKey) === null){
    localStorage.setItem(kcalKey, "0");
  }

  if(localStorage.getItem(historyKey) === null){
    localStorage.setItem(historyKey, JSON.stringify([]));
  }

  msg.style.color="green";
  msg.innerText="Login successful...";

  setTimeout(()=>{
    window.location.href="index.html";
  },1000);
}

/* ================= CREATE ACCOUNT ================= */
function createAccount(){

  let u = prompt("Enter username:");
  let p = prompt("Enter password:");

  if(!u || !p){
    alert("Please fill both fields");
    return;
  }

  let users = getUsers();

  if(users[u]){
    alert("User already exists!");
    return;
  }

  users[u] = p;
  saveUsers(users);

  alert("Account created successfully!");
}

</script>

</body>
</html>
