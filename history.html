<!DOCTYPE html>
<html>
<head>
  <title>History</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>📜 Workout History</h1>

  <nav>
    <a href="Dashboard.html">Dashboard</a>
    <a href="stats.html">Stats</a>
  </nav>
</header>

<div class="container">

  <div class="card">
    <h2>Your Workouts</h2>
    <div id="history"></div>
  </div>

</div>

<script>

let username = localStorage.getItem("username") || "guest";

let userKey = "fitness_" + username.toLowerCase();
let historyKey = userKey + "_history";

let history = JSON.parse(localStorage.getItem(historyKey)) || [];

let box = document.getElementById("history");

if (history.length === 0) {
  box.innerHTML = "<p>No workouts yet</p>";
} else {
  history.forEach(item => {
    box.innerHTML += `
      <div class="card">
        🏋️ ${item.workout}<br>
        ⏱ ${item.minutes} min<br>
        🔥 ${item.kcal} kcal
      </div>
    `;
  });
}

</script>

</body>
</html>
