<!DOCTYPE html>
<html>
<head>
  <title>History</title>
  <link rel="stylesheet" href="style.css">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(135deg,#007bff,#00c6ff);
      color: white;
    }

    .container { padding: 20px; }

    .card {
      background: rgba(255,255,255,0.15);
      padding: 20px;
      border-radius: 15px;
    }

    .item {
      background: rgba(255,255,255,0.2);
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }
  </style>
</head>

<body>

<header>
  <h1>📜 Workout History</h1>

  <nav>
    <a href="index.html">Dashboard</a>
    <a href="stats.html">Stats</a>
  </nav>
</header>

<div class="container">

  <div class="card">
    <h2>Your Workouts</h2>
    <div id="history"></div>
  </div>

</div>

<script>

let user = localStorage.getItem("username") || "guest";
let historyKey = user + "_history";

let history = JSON.parse(localStorage.getItem(historyKey)) || [];

let box = document.getElementById("history");

if (history.length === 0) {
  box.innerHTML = "<p>No workouts yet</p>";
} else {
  history.forEach(item => {
    box.innerHTML += `
      <div class="item">
        🏋️ ${item.workout}<br>
        ⏱ ${item.minutes} min<br>
        🔥 ${item.kcal} kcal
      </div>
    `;
  });
}

</script>

</body>
</html>
