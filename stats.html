<!DOCTYPE html>
<html>
<head>
  <title>Stats</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
  <h1>📊 Stats Graph</h1>
  <p>Graph how much calories burned</p>

  <nav>
    <a href="Dashboard.html">Dashboard</a>
    <a href="history.html">History</a>
  </nav>
</header>

<div class="container">

  <div class="card">
    <h2>Calories Graph</h2>
    <canvas id="chart"></canvas>
  </div>

</div>

<script>

let username = localStorage.getItem("username") || "guest";

let userKey = "fitness_" + username.toLowerCase();
let historyKey = userKey + "_history";

let history = JSON.parse(localStorage.getItem(historyKey)) || [];

let labels = history.map(x => x.workout);
let data = history.map(x => x.kcal);

if (labels.length === 0) {
  labels = ["No Data"];
  data = [0];
}

new Chart(document.getElementById("chart"), {
  type: "bar",
  data: {
    labels: labels,
    datasets: [{
      label: "Calories Burned",
      data: data,
      backgroundColor: "#ff4fd8"
    }]
  }
});

</script>

</body>
</html>
