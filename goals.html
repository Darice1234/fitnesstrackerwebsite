<!DOCTYPE html>
<html>
<head>
  <title>Goal</title>
  <link rel="stylesheet" href="style.css">

  <!-- Mobile scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-size: 20px;
      margin: 0;
      padding: 0;
    }

    h1 {
      font-size: 3rem;
    }

    h2 {
      font-size: 2rem;
    }

    .container {
      padding: 20px;
    }

    .card {
      padding: 25px;
      margin-top: 20px;
      border-radius: 12px;
    }

    input {
      font-size: 1.2rem;
      padding: 12px;
      width: 100%;
      max-width: 350px;
      display: block;
      margin: 10px 0;
    }

    button {
      font-size: 1.2rem;
      padding: 12px 18px;
      cursor: pointer;
    }

    #showGoal {
      font-size: 1.3rem;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>🎯 Goals</h1>
</header>

<div class="container">

  <div class="card">
    <h2>Set Your Daily Goal</h2>
    <input id="goal" placeholder="Daily calorie goal">
    <button onclick="setGoal()">Save</button>
  </div>

  <div class="card">
    <h2>Your Goal</h2>
    <p id="showGoal"></p>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
